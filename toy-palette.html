<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Shadertoy · Palette Fractal — XR</title>
  <link rel="stylesheet" href="./lib/common.css">
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <h1>Palette Fractal · Shadertoy</h1>
    <div class="small">Kishimisu's iconic iq-palette + fractional fractal intro shader, rendered on a floating AR portal panel.</div>
    <div class="hint">
      <b>Desktop:</b> drag to orbit · scroll to zoom.<br>
      <b>Quest 3:</b> Enter AR · squeeze to grab · both squeeze to scale · trigger to reset.
    </div>
  </div>
  <nav id="scene-switch"></nav>
  <div id="xrbtn-wrap"></div>
  <div id="log"></div>

  <script src="./lib/scene-switch.js" defer></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import { mountToy } from './lib/toy-viewer.js';

    // Original: https://www.shadertoy.com/view/mtyGWy  by kishimisu
    // Palette helper credited to Inigo Quilez — https://iquilezles.org/articles/palettes/
    const frag = `
      vec3 palette(float t) {
        vec3 a = vec3(0.5, 0.5, 0.5);
        vec3 b = vec3(0.5, 0.5, 0.5);
        vec3 c = vec3(1.0, 1.0, 1.0);
        vec3 d = vec3(0.263, 0.416, 0.557);
        return a + b*cos(6.28318*(c*t + d));
      }
      void mainImage(out vec4 fragColor, in vec2 fragCoord) {
        vec2 uv = (fragCoord * 2.0 - iResolution.xy) / iResolution.y;
        vec2 uv0 = uv;
        vec3 finalColor = vec3(0.0);
        for (float i = 0.0; i < 4.0; i++) {
          uv = fract(uv * 1.5) - 0.5;
          float d = length(uv) * exp(-length(uv0));
          vec3 col = palette(length(uv0) + i*0.4 + iTime*0.4);
          d = sin(d*8.0 + iTime)/8.0;
          d = abs(d);
          d = pow(0.01 / d, 1.2);
          finalColor += col * d;
        }
        fragColor = vec4(finalColor, 1.0);
      }
    `;

    mountToy(frag, { aspect: 1.0, width: 1.0, resolution: 768 });
  </script>
</body>
</html>
