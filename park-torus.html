<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Shader Park · Noisy Torus — XR</title>
  <link rel="stylesheet" href="./lib/common.css">
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <h1>Noisy Torus · Shader Park 3D</h1>
    <div class="small">Displaced green torus with vertical-line ornamentation and ray-direction noise.</div>
    <div class="hint">
      <b>Desktop:</b> drag to orbit · scroll to zoom.<br>
      <b>Quest 3:</b> Enter AR · squeeze to grab · both squeeze to scale · trigger to reset.
    </div>
  </div>
  <nav id="scene-switch"></nav>
  <div id="xrbtn-wrap"></div>
  <div id="log"></div>

  <script src="./lib/scene-switch.js" defer></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "shader-park-core": "https://unpkg.com/shader-park-core@0.2.8/dist/shader-park-core.esm.js"
    }
  }
  </script>

  <script type="module">
    import { mountPark } from './lib/park-viewer.js';

    const spSource = `
      let scale = 10.0;
      setStepSize(.4);
      let s = getSpace();
      rotateX(PI/2);
      let n = 0.005*noise(scale * s);
      let rtp = getSpherical(getSpace());
      let verticalLines = sin(15*rtp.z+n*200);
      let endsDampen = sin(rtp.y);

      let col = vec3(0, 0.7, 0.0)*0.25 + 0.07*verticalLines*pow(endsDampen, .9)+vec3(.1);
      let n2 = (noise(getRayDirection()+ verticalLines *pow(endsDampen, 2.3) + vec3(0, time*.2, 0)));
      occlusion(.1);
      color(pow(vec3(n2)+s*.5+.5, vec3(1)));

      torus(.4, .2);
      expand(n2*.1);
    `;

    mountPark(spSource, {
      geometry: 'sphere',
      radius: 1.0,
      initialScale: 0.5
    });
  </script>
</body>
</html>
