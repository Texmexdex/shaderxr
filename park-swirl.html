<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
  <title>Shader Park · Swirl (2D port) — XR</title>
  <link rel="stylesheet" href="./lib/common.css">
</head>
<body>
  <div id="app"></div>
  <div id="ui">
    <h1>Swirl · Shader Park 2D</h1>
    <div class="small">A Shadertoy port rendered as a flat Shader Park sculpt on a floating panel in AR.</div>
    <div class="hint">
      <b>Desktop:</b> drag to orbit · scroll to zoom.<br>
      <b>Quest 3:</b> Enter AR · squeeze to grab · both squeeze to scale · trigger to reset.
    </div>
  </div>
  <nav id="scene-switch"></nav>
  <div id="xrbtn-wrap"></div>
  <div id="log"></div>

  <script src="./lib/scene-switch.js" defer></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "shader-park-core": "https://unpkg.com/shader-park-core@0.2.8/dist/shader-park-core.esm.js"
    }
  }
  </script>

  <script type="module">
    import { mountPark } from './lib/park-viewer.js';

    const spSource = `
      let p = enable2D();
      p = vec3(p.x, p.y, 0);
      let c = [0, 0, 0];
      let l = 1;
      let z = time;
      for (let i = 0; i < 3; i++) {
        let uv = vec3(p.x, p.y, 0);
        z += .03;
        l = length(p);
        uv += p/l*(sin(z)+1.)*abs(sin(l*9.-z*2.));
        c[i] = .01/length(abs(fract(uv-0.5)-.5));
      }
      color(c[0]/l, c[1]/l, c[2]/l);
    `;

    mountPark(spSource, {
      geometry: 'plane',
      radius: 0.6,
      initialScale: 1.0
    });
  </script>
</body>
</html>
